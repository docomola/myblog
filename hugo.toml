baseURL = 'https://docomola.github.io/myblog/'
languageCode = 'zh-cn'
title = 'My Blog'
theme = 'PaperMod'

[params]
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecialDisqusRender = true
  ShowToc = true

[params.homeInfoParams]
  Title = "欢迎来到我的博客"
  Content = "这里是我用 Hugo + PaperMod 搭建的博客"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags"
    weight = 30
