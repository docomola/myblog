baseURL = 'https://docomola.github.io/myblog/'
languageCode = 'zh-cn'
title = 'My Blog'
theme = 'compose'

[params]
  author = 'docomola'
  description = '我的个人博客'
  mainSections = ['posts']
  showMenuItems = 3
  showToc = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  useCDN = false

  [params.homeInfoParams]
    Title = "欢迎来到我的博客"
    Content = "这里是我用 Hugo + Compose 搭建的博客"

[menu]
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20
